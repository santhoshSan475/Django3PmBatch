<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <h1>Customer Details</h1>
    <table class="table table-bordered table-dark text-center table-hover p-5">
        <thead>
          <tr>
              <th>customerName</th>
              <th>phoneNumber</th>
              <th>address</th>
              <th>emailAddress</th>
              <th>customerType</th>
              <th>Update</th>
              <th>Delete</th>
          </tr>
        </thead>
        <tbody>
           {% for value in customer %}
              <tr>
                  <td>{{value.customerName}}</td>
                  <td>{{value.phoneNumber}}</td>
                  <td>{{value.address}}</td>
                  <td>{{value.emailAddress}}</td>
                  <td>{{value.customerType}}</td>
                  <td><button><a href="{% url 'valueUpdate' value.id %}" target="_blank">Update</a></button></td>
                  <td><button><a href="{% url 'valueDelete' value.id %}">Delete</a></button></td>
              </tr>
           {% endfor %}
        </tbody>
    </table>
</body>
</html>
